apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: bootstrap
  namespace: argocd
  # Use finalizer to delete resources when Application is deleted
  # finalizers:
  #   - resources-finalizer.argocd.argoproj.io
spec:
  syncPolicy:
    preserveResourcesOnDeletion: true
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusters:
        selector:
          matchExpressions:
            - key: argocd.argoproj.io/secret-type
              operator: In
              values:
                - cluster
        values:
          # This is the repository passed to each Cluster ApplicationSet
          repoURL: https://github.com/gnunn-gitops/cluster-config-v2
          targetRevision: '{{ ternary (.metadata.annotations.targetRevision) ("HEAD") (ne (index .metadata.annotations "targetRevision") nil) }}'
  ignoreApplicationDifferences:
    - jsonPointers:
        - /spec/syncPolicy/automated
  template:
    metadata:
      name: 'bootstrap-{{ .name }}'
      labels:
        cluster-name: '{{ .name }}'
        env: '{{ .metadata.labels.env }}'
        region: '{{ .metadata.labels.region }}'
        type: '{{ .metadata.labels.type }}'
    spec:
      # Comment out for debugging appset parameters
      # info:
      #   - name: "parameters"
      #     value: |
      #       {{ toPrettyJson . }}
      project: bootstrap
      source:
        repoURL: '{{ .values.repoURL }}'
        targetRevision: '{{ .values.targetRevision }}'
        path: clusters
        helm:
          parameters:
            - name: clusterName
              value: '{{ .name }}'
            - name: targetRevision
              value: '{{ .metadata.annotations.targetRevision }}'
            - name: repoURL
              value: '{{ .values.repoURL }}'
      destination:
        name: hub-prod-local
        namespace: argocd
      syncPolicy:
        automated:
          enabled: true
          selfHeal: true
