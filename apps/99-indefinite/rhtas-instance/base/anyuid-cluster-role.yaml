apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: system:openshift:scc:anyuid
  namespace: trusted-artifact-signer
subjects:
- kind: ServiceAccount
  name: trillian-db
  namespace: trusted-artifact-signer
- kind: ServiceAccount
  name: rekor
  namespace: trusted-artifact-signer
roleRef:
  kind: ClusterRole
  name: system:openshift:scc:anyuid
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: system:openshift:scc:privileged
  namespace: trusted-artifact-signer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:privileged
subjects:
- kind: ServiceAccount
  name: rekor
  namespace: trusted-artifact-signer
- kind: ServiceAccount
  name: trillian-db
  namespace: trusted-artifact-signer
