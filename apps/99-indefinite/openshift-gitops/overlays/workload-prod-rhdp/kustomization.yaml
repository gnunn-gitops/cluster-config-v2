apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

components:
- ../../components/health-application
- ../../components/health-build
- ../../components/health-imagestream
- ../../components/health-ingress
- ../../components/health-pvc
- ../../components/health-subscription

resources:
- ../../base
- cluster-config-appproject.yaml

patches:
  - patch: |
      - op: replace
        path: /spec/provider/kubernetes/remoteNamespace
        value: argocd-standalone
    target:
      kind: SecretStore
      name: k8s-store
  - patch: |
      - op: replace
        path: /subjects/0/namespace
        value: argocd-standalone
      - op: replace
        path: /metadata/name
        value: lightspeed-operator-query-access-argocd-standalone
    target:
      kind: ClusterRoleBinding
      name: lightspeed-operator-query-access-argocd
