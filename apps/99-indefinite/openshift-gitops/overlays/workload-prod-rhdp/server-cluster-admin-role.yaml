kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: argocd-argocd-server-cluster-reader
subjects:
  - kind: ServiceAccount
    name: argocd-argocd-server
    namespace: argocd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  # Needed for resource actions
  name: cluster-admin
