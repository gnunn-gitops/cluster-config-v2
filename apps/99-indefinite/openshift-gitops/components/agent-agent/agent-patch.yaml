apiVersion: argoproj.io/v1beta1
kind: ArgoCD
metadata:
  name: argocd
  namespace: argocd
spec:
  argoCDAgent:
    agent:
      enabled: true
      creds: mtls:CN=([^,]+)
      client:
        enableCompression: true
        enableWebSocket: false
        mode: managed
        principalServerAddress: argocd-agent-principal-argocd.apps.hub.ocplab.com
      destinationBasedMapping:
        enabled: true
        createNamespace: true
      #image: quay.io/gnunn/argocd-agent:namespace-mapping-fix
      image: quay.io/argoprojlabs/argocd-agent:v0.9.0
      tls:
        rootCASecretName: argocd-agent-ca
        secretName: argocd-agent-client-tls
  server:
    enabled: false
  sourceNamespaces:
    - "*-argocd"
