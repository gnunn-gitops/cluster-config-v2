apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

patches:
  - patch: |-
      - op: add
        path: /spec/server/extraCommandArgs
        value:
          - "--enable-proxy-extension"
      - op: add
        path: /spec/server/volumes
        value:
          - name: extensions
            emptyDir: {}
    target:
      kind: ArgoCD
