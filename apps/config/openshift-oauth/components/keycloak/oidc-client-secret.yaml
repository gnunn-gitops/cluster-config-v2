apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  annotations:
    argocd.argoproj.io/compare-options: IgnoreExtraneous
  name: oidc-client-secret
  namespace: openshift-config
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: cluster
  target:
    name: oidc-client-secret
  data:
    - secretKey: clientSecret
      remoteRef:
        key: OIDC_OCPLAB
