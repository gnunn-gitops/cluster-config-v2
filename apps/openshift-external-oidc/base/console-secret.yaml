apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: console-secret
  namespace: openshift-config
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: cluster
  target:
    name: console-secret
  data:
    - secretKey: clientSecret
      remoteRef:
        key: OIDC_OCPLAB
