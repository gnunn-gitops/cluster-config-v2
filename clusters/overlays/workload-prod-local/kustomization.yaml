apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

resources:
- ../../base

patches:
  - patch: |
      - op: replace
        path: /metadata/name
        value: workload-prod-local
      - op: replace
        path: /spec/generators/0/matrix/generators/0/git/files
        value:
          - path: apps/**/overlays/all/config.json
          - path: apps/**/overlays/workload/config.json
          - path: apps/**/overlays/workload-prod/config.json
          - path: apps/**/overlays/workload-prod-local/config.json
      - op: replace
        path: /spec/generators/0/matrix/generators/1/clusters/selector/matchLabels/argocd-agent.argoproj-labs.io~1agent-name
        value: workload-prod-local
      - op: replace
        path: /spec/template/metadata/name
        value: "wpl-{{ .values.name }}"
      - op: replace
        path: /spec/template/spec/project
        value: workload-prod-local

    target:
      kind: ApplicationSet
      name: cluster-config
